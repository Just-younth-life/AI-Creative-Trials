<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>多智能体可信决策引擎 | MVP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui;background:#FFFAF5;color:#3A3A3A;}
.container{display:grid;grid-template-columns:240px 1fr;height:100vh;}
.left{background:#fff;border-right:1px solid #eee;padding:20px;}
.main{display:flex;flex-direction:column;}
.chat{flex:1;padding:20px;overflow:auto;}
.input-area{padding:16px;border-top:1px solid #eee;background:#fff;}
.bottom-tag{padding:10px 20px;background:#FFF3EB;border-top:1px solid #eee;display:flex;gap:12px;align-items:center;}
.tag-item{padding:4px 12px;border-radius:12px;border:1px solid #ccc;font-size:13px;cursor:pointer;}
.tag-item.active{background:#F2A97F;color:#fff;border-color:#F2A97F;}
textarea{width:100%;height:80px;padding:12px;border-radius:8px;border:1px solid #ddd;resize:none;background:#fff;}
button{padding:8px 20px;background:#F2A97F;color:#fff;border:none;border-radius:6px;margin-top:8px;cursor:pointer;}
.answer-box{background:#fff;padding:16px;border-radius:10px;margin:12px 0;}
.high{border-left:4px solid #A8D8C7;}
.diff{border-left:4px solid #F7C287;}
.warn{border-left:4px solid #E89494;}
.guide{background:#EFF6FF;padding:10px;border-radius:8px;margin-bottom:12px;}
.tag-auto{font-size:12px;color:#888;margin-top:6px;}
</style>
</head>
<body>
<div class="container">
    <div class="left">
        <h3>我的决策库</h3>
        <p style="font-size:13px;color:#888;margin:10px 0;">可搜索、溯源、复盘</p>
    </div>
    <div class="main">
        <div class="chat" id="chat"></div>
        <div class="input-area">
            <textarea id="q" placeholder="输入你的问题，系统自动适配你的水平与场景"></textarea>
            <button onclick="send()">发送提问</button>
        </div>
        <div class="bottom-tag">
            <span>我的身份：</span>
            <div class="tag-item active" onclick="setTag(this,'学生')">学生</div>
            <div class="tag-item" onclick="setTag(this,'职场')">职场</div>
            <div class="tag-item" onclick="setTag(this,'生活')">生活决策</div>
        </div>
    </div>
</div>
<script>
let nowTag = "学生";
function setTag(dom,tag){
    document.querySelectorAll('.tag-item').forEach(x=>x.classList.remove('active'));
    dom.classList.add('active');
    nowTag = tag;
}
async function send(){
    let q = document.getElementById('q').value.trim();
    if(!q) return;
    let chat = document.getElementById('chat');
    chat.innerHTML += `<div style="margin:8px 0;"><b>我：</b>${q}</div>`;
    chat.innerHTML += `
    <div class="answer-box">
        <div class="guide">💡【阅读指引】系统已根据【${nowTag}】自动适配内容深度，优先查看高可信结论</div>
        <div class="answer-box high">
            <b>✅ 高可信稳妥共识结论</b>
            <p>多智能体交叉核验、权威资料支撑，适配你的认知水平，可优先参考。</p>
        </div>
        <div class="answer-box diff">
            <b>⚖️ 不同视角分歧（通俗解读）</b>
            <p>各智能体思考侧重不同，无绝对对错，适配不同使用场景。</p>
        </div>
        <div class="answer-box warn">
            <b>⚠️ 仅供参考存疑内容</b>
            <p>无完整权威溯源支撑，使用前建议自行核验。</p>
        </div>
        <p class="tag-auto">自动标签：${nowTag}｜高可信｜可溯源核验</p>
        <p style="font-size:12px;color:#888;margin-top:10px;">资料来源四层过滤，外网真实来源≥60%，虚构内容已过滤</p>
    </div>
    `
    document.getElementById('q').value = '';
}
</script>
</body>
</html>
